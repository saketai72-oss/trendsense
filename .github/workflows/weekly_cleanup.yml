name: 🧹 Weekly Viral Status Reset (Chủ Nhật)

# Duyệt qua các video đã quá 2 tuần → reset viral_probability = 0
on:
  schedule:
    - cron: '0 18 * * 0' # 18:00 UTC = 01:00 ICT Chủ Nhật
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cleanup:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Kéo code từ repo
        uses: actions/checkout@v4

      - name: 🐍 Cài đặt Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 📦 Cài đặt thư viện
        run: pip install psycopg2-binary python-dotenv

      - name: 🧹 Reset viral status cho video cũ
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scripts/reset_viral_predictions.py

name: 🧠 Weekly Model Retrain (Chủ Nhật Nửa Đêm)

# Chạy nửa đêm Chủ Nhật: Huấn luyện lại model dựa trên dữ liệu đã được AI xử lý
on:
  schedule:
    - cron: '0 17 * * 0'  # 17:00 UTC = 00:00 ICT
  workflow_dispatch:

permissions:
  contents: write

jobs:
  retrain-model:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: 📥 Kéo code từ repo
        uses: actions/checkout@v4

      - name: 🐍 Cài đặt Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: 📦 Cài đặt thư viện
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt --only-binary scikit-learn

      - name: 🕷️ BƯỚC 1 — Cào stats mới nhất
        run: python src/scraper/scraper_main.py

      - name: 🎓 BƯỚC 2 — Train model (Dựa trên data đã được Local AI phân tích)
        run: python src/ai_core/train_model.py

      - name: 💾 BƯỚC 3 — Push model lên repository
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/models/rf_model.joblib data/models/metrics.json
          git commit -m "🧠 Weekly model update [skip ci]" || echo "No changes"
          git push origin main

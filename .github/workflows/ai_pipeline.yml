name: 🤖 Tự động lấy data mới và chạy AI

# Lên lịch chạy: Chạy mỗi 4 tiếng 1 lần và cho phép bấm chạy bằng tay
on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

# Cho phép con Bot của Github được quyền ghi đè (Push) file CSV mới lên repo
permissions:
  contents: write

jobs:
  run-ai-pipeline:
    runs-on: ubuntu-latest 

    steps:
      - name: 📥 Kéo code từ kho về máy ảo
        uses: actions/checkout@v4

      - name: 🐍 Cài đặt Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # Lưu cache để lần sau cài thư viện nhanh hơn

      - name: 📦 Cài đặt thư viện (Requirements)
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt --only-binary scikit-learn

      - name: 🌐 Cài đặt Trình duyệt Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: 🔄 Cập nhật code và data mới nhất từ Repo
        run: |
          git pull origin main 

      - name: 🕷️ BƯỚC 1 - Bot Selenium cào data thực tế
        run: python src/scraper/scraper_main.py

      - name: 🧠 BƯỚC 2 - AI Xử lý Ngôn ngữ & Dự báo Xu hướng
        run: python src/ai_core/ai_core_main.py

      - name: 💾 Lưu và Nối đuôi dữ liệu
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/  # Ép Git nhận file dù có trong .gitignore
          git commit -m "🤖 AI cập nhật nối đuôi dữ liệu [skip ci]" || echo "Không có gì mới"
          git push origin main
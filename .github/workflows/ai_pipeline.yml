name: ⚡ Scrape & Inference (Mỗi 4 giờ)

# Lên lịch chạy: Mỗi 4 tiếng và cho phép bấm chạy bằng tay
on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

permissions:
  contents: read  # Chỉ cần quyền đọc code, KHÔNG push gì lên repo

jobs:
  scrape-and-predict:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Kéo code từ kho về máy ảo
        uses: actions/checkout@v4

      - name: 🐍 Cài đặt Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 📦 Cài đặt thư viện
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt --only-binary scikit-learn

      - name: 🌐 Cài đặt trình duyệt Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: 🕷️ BƯỚC 1 — Bot Selenium cào data mới → SQLite
        run: python src/scraper/scraper_main.py

      - name: 🧠 BƯỚC 2 — AI phân tích NLP (chỉ video mới) + Predict (model sẵn)
        run: python src/ai_core/ai_core_main.py
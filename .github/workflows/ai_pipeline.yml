name: 🕷️ TrendSense Scrape + AI Pipeline (Mỗi 4 giờ)

# Lên lịch chạy: Mỗi 4 tiếng cào dữ liệu → gửi nhỏ giọt sang Modal GPU xử lý AI
on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scrape-and-trigger-ai:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      MODAL_WEBHOOK_URL: ${{ secrets.MODAL_WEBHOOK_URL }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: 📥 Kéo code từ repo
        uses: actions/checkout@v4

      - name: 🐍 Cài đặt Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Cài đặt thư viện (Scraper only — Không cần Torch/AI)
        run: |
          python -m pip install --upgrade pip
          pip install -r services/tiktok_scraper/requirements.txt

      - name: 🌐 Cài đặt Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: 🕷️ SCRAPE + TRIGGER — Bot Selenium cào metadata → Gửi sang Modal AI
        env:
          PYTHONPATH: .
        run: python -m services.tiktok_scraper.scraper_main

      - name: 📢 Thông báo
        run: |
          echo "============================================"
          echo "[✓] Scraping hoàn tất!"
          echo "[✓] Các video đã được gửi sang Modal GPU để xử lý AI."
          echo "[✓] Kết quả sẽ tự động cập nhật vào Supabase."
          echo "============================================"
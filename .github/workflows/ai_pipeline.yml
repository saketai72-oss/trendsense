name: 🕷️ TrendSense Data Ingestion (Mỗi 4 giờ)

# Lên lịch chạy: Mỗi 4 tiếng cào dữ liệu thô đẩy lên Supabase
on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scrape-data:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: 📥 Kéo code từ repo
        uses: actions/checkout@v4

      - name: 🐍 Cài đặt Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: 📦 Cài đặt thư viện
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🌐 Cài đặt Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: 🕷️ BƯỚC 1 — Bot Selenium thu thập metadata mới
        run: python src/scraper/scraper_main.py

      - name: 📢 Thông báo
        run: echo "[✓] Dữ liệu thô đã được đẩy lên Supabase. Chờ Local AI Worker xử lý..."
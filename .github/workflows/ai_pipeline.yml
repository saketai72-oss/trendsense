name: 🕷️ TrendSense Scrape + AI Pipeline (Mỗi 4 giờ)

# Lên lịch chạy: Mỗi 4 tiếng cào dữ liệu → gửi nhỏ giọt sang Modal GPU xử lý AI
# on:
#   schedule:
#     - cron: '0 */4 * * *'
#   workflow_dispatch:

permissions:
  contents: read

jobs:
  scrape-and-trigger-ai:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      MODAL_WEBHOOK_URL: ${{ secrets.MODAL_WEBHOOK_URL }}
      GEMINI_WEBHOOK_URL: ${{ secrets.GEMINI_WEBHOOK_URL }}
      # PROXY_LIST sẽ được nạp động từ TheSpeedX/PROXY-List ở bước sau, fallback là secret nếu cần
      PROXY_LIST_SECRET: ${{ secrets.PROXY_LIST }}
      ms_token: ${{ secrets.MS_TOKEN }}
      CF_WORKER_URL: ${{ secrets.CF_WORKER_URL }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: 📥 Kéo code từ repo
        uses: actions/checkout@v4

      - name: 🐍 Cài đặt Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Cài đặt thư viện (Scraper only — Không cần Torch/AI)
        run: |
          python -m pip install --upgrade pip
          pip install -r services/tiktok_scraper/requirements.txt

      - name: 🌐 Cài đặt Chrome + ChromeDriver matching
        run: |
          # Cài Chrome stable
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | gpg --batch --dearmor | sudo tee /usr/share/keyrings/google-chrome.gpg > /dev/null
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/google-chrome.gpg] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list > /dev/null
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable
          
          # Lấy version THỰC TẾ từ Chrome binary (không phải từ package manager)
          CHROME_BIN=$(which google-chrome-stable || which google-chrome)
          CHROME_VER=$($CHROME_BIN --version | grep -oP '\d+\.\d+\.\d+\.\d+')
          echo "[*] Chrome binary version: $CHROME_VER"
          
          # Download chromedriver matching từ Chrome for Testing
          CD_URL="https://storage.googleapis.com/chrome-for-testing-public/${CHROME_VER}/linux64/chromedriver-linux64.zip"
          echo "[*] Trying: $CD_URL"
          if wget -q --spider "$CD_URL" 2>/dev/null; then
            wget -q -O /tmp/chromedriver.zip "$CD_URL"
            sudo unzip -o /tmp/chromedriver.zip -d /tmp/
            sudo cp /tmp/chromedriver-linux64/chromedriver /usr/local/bin/chromedriver
            sudo chmod +x /usr/local/bin/chromedriver
            echo "[*] Installed chromedriver $CHROME_VER"
          else
            # Fallback: dùng chromedriver-autoinstaller trong Python
            echo "[!] ChromeDriver $CHROME_VER not found on CfT API. Will use Python fallback."
          fi
          
          # Verify version match
          CD_VER=$(/usr/local/bin/chromedriver --version 2>/dev/null | grep -oP '\d+\.\d+\.\d+\.\d+' || echo "none")
          echo "[*] ChromeDriver version: $CD_VER"
          echo "[*] Chrome version: $CHROME_VER"

      - name: 🎭 Cài đặt Playwright browsers (cho TikTokApi)
        run: |
          playwright install chromium
          playwright install-deps chromium

      - name: 🌐 Lấy proxy từ TheSpeedX/PROXY-List
        run: |
          echo "[*] Đang tải danh sách proxy HTTP..."
          curl -s https://raw.githubusercontent.com/TheSpeedX/PROXY-List/master/http.txt -o http_proxies.txt
          
          # Nếu tải không được hoặc file rỗng, dùng fallback từ secret
          if [ ! -s http_proxies.txt ]; then
            echo "[!] Không tải được proxy. Sử dụng PROXY_LIST từ secret."
            echo "PROXY_LIST=$PROXY_LIST_SECRET" >> $GITHUB_ENV
          else
            # Lấy 100 proxy đầu tiên, loại bỏ dòng trống, nối thành chuỗi
            PROXY_STR=$(head -n 100 http_proxies.txt | grep -v '^\s*$' | tr '\n' ',' | sed 's/,$//')
            echo "PROXY_LIST=$PROXY_STR" >> $GITHUB_ENV
            echo "[*] Đã cấu hình ${#PROXY_STR} ký tự proxy."
          fi

      - name: 🕷️ SCRAPE + TRIGGER — Bot cào metadata → Gửi sang Modal AI
        env:
          PYTHONPATH: .
        run: python -m services.tiktok_scraper.scraper_main
        continue-on-error: true

      - name: 📸 Upload debug snapshots (nếu có)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-snapshots
          path: debug_snapshots/
          if-no-files-found: ignore

      - name: 📢 Thông báo
        if: always()
        run: |
          echo "============================================"
          echo "[✓] Pipeline hoàn tất!"
          echo "    Nếu 0 video → kiểm tra PROXY_LIST secret."
          echo "    TikTok chặn IP datacenter nếu không có residential proxy."
          echo "[✓] Các video đã được gửi sang Modal GPU để xử lý AI."
          echo "=============================================="
name: 🧠 Daily Model Retrain (00:00 ICT)

# Chạy hàng ngày lúc nửa đêm: Huấn luyện lại Dual Model để bám sát xu hướng mới nhất
on:
  schedule:
    - cron: '0 17 * * *'  # 17:00 UTC = 00:00 ICT hàng ngày
  workflow_dispatch:

permissions:
  contents: write

jobs:
  retrain-model:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: 📥 Kéo code từ repo
        uses: actions/checkout@v4

      - name: 🐍 Cài đặt Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: 📦 Cài đặt thư viện
        run: |
          python -m pip install --upgrade pip
          pip install -r services/tiktok_scraper/requirements.txt
          pip install -r services/ai_engine/requirements.txt --only-binary scikit-learn

      - name: 🎓 BƯỚC 1 — Train Dual Models (Engagement & Alignment)
        env:
          PYTHONPATH: .
        run: python -m services.ai_engine.train_model

      - name: 💾 BƯỚC 2 — Push models lên repository
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/models/*.joblib data/models/*.json
          git commit -m "🧠 Daily dual-model update [skip ci]" || echo "No changes"
          git push
